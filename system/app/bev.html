<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARAS - 3D Object Tracking Visualization</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0a0a;
            color: #fff;
            overflow: hidden;
        }
        
        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }
        
        #canvas-2d {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none; /* hidden by default */
            z-index: 1; /* Keep below UI controls */
        }
        
        #info-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.8);
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #333;
            min-width: 300px;
            max-height: 80vh;
            overflow-y: auto;
            font-size: 14px;
            backdrop-filter: blur(10px);
            z-index: 100;
        }
        
        #speed-panel {
            position: absolute;
            top: 20px;
            left: 340px;
            background: rgba(0, 0, 0, 0.8);
            padding: 15px 35px 15px 20px;
            border-radius: 8px;
            border: 1px solid #333;
            backdrop-filter: blur(10px);
            z-index: 100;
        }

        .speed-wrapper {
            position: relative;
            display: flex;
            align-items: baseline;
        }

        .speed-display {
            font-size: 32px;
            font-weight: bold;
            color: #fff;
            margin-right: 4px;
        }
        
        .speed-unit {
            font-size: 14px;
            color: #888;
        }

        .speed-limit-display {
            position: absolute;
            top: -16px;
            right: -38px;
            font-size: 15px;
            font-weight: bold;
            color: #000;
            border: 4px solid #ff5252;
            border-radius: 50%;
            width: 34px;
            height: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fff;
            box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.3), 0 2px 6px rgba(0, 0, 0, 0.6);
        }
        
        #info-panel h2 {
            margin-bottom: 15px;
            color: #4CAF50;
            font-size: 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #minimize-btn {
            background: none;
            border: none;
            color: #888;
            cursor: pointer;
            font-size: 16px;
            padding: 0 5px;
        }
        
        #minimize-btn:hover {
            color: #fff;
        }
        
        #info-content {
            transition: all 0.3s ease;
        }
        
        #info-content.minimized {
            display: none;
        }
        
        .status-item {
            margin-bottom: 10px;
            padding: 8px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
        }
        
        .status-label {
            color: #888;
            font-size: 12px;
            text-transform: uppercase;
        }
        
        .status-value {
            color: #fff;
            font-weight: bold;
            margin-top: 4px;
        }
        
        .object-item {
            margin: 8px 0;
            padding: 10px;
            background: rgba(33, 150, 243, 0.1);
            border-left: 3px solid #2196F3;
            border-radius: 4px;
        }
        
        .object-item.tentative {
            background: rgba(33, 150, 243, 0.06);
            border-left-color: #64B5F6;
        }

        .object-item.back-obj {
            background: rgba(255, 193, 7, 0.1);
            border-left-color: #FFC107;
        }

        .object-item.collision {
            background: rgba(244, 67, 54, 0.18);
            border-left-color: #F44336;
            animation: flash 0.5s infinite alternate;
        }

        .object-item.blindspot {
            background: rgba(255, 152, 0, 0.18);
            border-left-color: #FF9800;
        }

        @keyframes flash {
            from { background: rgba(244, 67, 54, 0.18); }
            to   { background: rgba(244, 67, 54, 0.45); }
        }
        
        .object-item.tentative {
            opacity: 0.6;
        }
        
        .object-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
        }
        
        .object-name {
            font-weight: bold;
            text-transform: capitalize;
            color: #2196F3;
        }
        
        .object-item.back-obj .object-name {
            color: #FFC107;
        }

        .object-item.collision .object-name {
            color: #F44336;
        }

        .object-item.blindspot .object-name {
            color: #FF9800;
        }
        
        .object-id {
            color: #888;
            font-size: 12px;
        }
        
        .object-details {
            font-size: 12px;
            color: #ccc;
        }
        
        #controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.8);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #333;
            backdrop-filter: blur(10px);
            z-index: 100;
        }
        
        .control-group {
            margin: 10px 0;
        }
        
        .control-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 12px;
            color: #888;
        }
        
        button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            margin-right: 5px;
        }
        
        button:hover {
            background: #45a049;
        }
        
        button.secondary {
            background: #555;
        }
        
        button.secondary:hover {
            background: #666;
        }
        
        .connection-status {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }
        
        .connection-status.connected {
            background: rgba(76, 175, 80, 0.3);
            border: 1px solid #4CAF50;
            color: #4CAF50;
        }
        
        .connection-status.disconnected {
            background: rgba(244, 67, 54, 0.3);
            border: 1px solid #f44336;
            color: #f44336;
        }

        #top-right-sign {
            position: absolute;
            top: 20px;
            right: 220px;
            background: rgba(0, 0, 0, 0.8);
            border: 3px solid #FFD700;
            border-radius: 12px;
            padding: 15px 25px;
            color: #FFD700;
            text-align: center;
            display: none;
            z-index: 1000;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.4);
            backdrop-filter: blur(10px);
            min-width: 140px;
        }

        #top-right-sign-icon {
            font-size: 36px;
            margin-bottom: 5px;
        }

        #top-right-sign-name {
            font-size: 16px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        #side-warnings {
            position: absolute;
            right: 0;
            top: 0;
            width: 20%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
            padding: 20px;
            box-sizing: border-box;
            pointer-events: none;
            z-index: 1000;
        }
        
        .warning-box {
            width: 100%;
            background: rgba(244, 67, 54, 0.9);
            border: 3px solid #ff0000;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            color: white;
            display: none;
            animation: pulse 0.5s infinite alternate;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.8);
        }
        
        .warning-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }
        
        .warning-text {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .warning-info {
            font-size: 18px;
        }
        
        @keyframes pulse {
            from { opacity: 0.8; transform: scale(1); }
            to { opacity: 1; transform: scale(1.05); }
        }

        #blind-spot-indicators {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 150px;
            z-index: 100;
        }
        
        .blind-spot-indicator {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: rgba(100, 100, 100, 0.3);
            border: 4px solid #555;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: bold;
            color: #888;
            transition: all 0.3s;
        }
        
        .blind-spot-indicator.active {
            background: rgba(255, 193, 7, 0.8);
            border-color: #ffc107;
            color: #000;
            box-shadow: 0 0 30px rgba(255, 193, 7, 0.8);
            animation: vibrate 0.1s infinite;
        }

        @keyframes vibrate {
            0%, 100% { transform: translate(0, 0); }
            25% { transform: translate(-3px, 3px); }
            50% { transform: translate(3px, -3px); }
            75% { transform: translate(-3px, -3px); }
        }
    </style>
</head>
<body>
    <div id="canvas-container">
        <!-- The WebGL renderer canvas will be appended here by Three.js -->
        <canvas id="canvas-2d"></canvas>
    </div>
    
    <div class="connection-status disconnected" id="connection-status">
        ● DISCONNECTED
    </div>
    
    <div id="top-right-sign">
        <div id="top-right-sign-icon">🛑</div>
        <div id="top-right-sign-name">STOP SIGN</div>
    </div>
    
    <div id="side-warnings">
        <div id="warning-front" class="warning-box">
            <div class="warning-icon">⚠️</div>
            <div class="warning-text">FRONT COLLISION</div>
            <div id="warning-front-info" class="warning-info"></div>
        </div>
        <div id="warning-back" class="warning-box">
            <div class="warning-icon">⚠️</div>
            <div class="warning-text">BACK COLLISION</div>
            <div id="warning-back-info" class="warning-info"></div>
        </div>
    </div>
    
    <div id="blind-spot-indicators">
        <div class="blind-spot-indicator" id="blind-spot-left">
            LEFT
        </div>
        <div class="blind-spot-indicator" id="blind-spot-right">
            RIGHT
        </div>
    </div>
    
    <div id="info-panel">
        <h2>
            ARAS Tracking System
            <button id="minimize-btn" title="Toggle Panel">▼</button>
        </h2>
        <div id="info-content">
            <div class="status-item">
                <div class="status-label">Tracked Objects</div>
                <div class="status-value" id="object-count">0 confirmed, 0 tentative</div>
            </div>
            <div class="status-item">
                <div class="status-label">Update Rate</div>
                <div class="status-value" id="update-rate">0 Hz</div>
            </div>
            <div id="objects-list"></div>
        </div>
    </div>
    
    <div id="speed-panel">
        <div class="speed-wrapper">
            <div class="speed-display" id="current-speed">--</div>
            <div class="speed-unit">km/h</div>
            <div class="speed-limit-display" id="speed-limit">--</div>
        </div>
    </div>

    <div id="controls">
        <div class="control-group">
            <button id="toggle-mode" style="background: #2196F3;">Switch to 2D Mode</button>
        </div>
        <div class="control-group">
            <button id="reset-camera">Reset Camera</button>
            <button id="toggle-grid" class="secondary">Toggle Grid</button>
        </div>
        <div class="control-group">
            <button id="toggle-labels" class="secondary">Toggle Labels</button>
            <button id="toggle-trails" class="secondary">Toggle Trails</button>
        </div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
    }
    </script>
    
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { FontLoader } from 'three/addons/loaders/FontLoader.js';
        import { TextGeometry } from 'three/addons/geometries/TextGeometry.js';

        // Object dimensions (width, height, depth in meters)
        // Values dynamically overwritten by WebSocket config
        let CLASS_DIMENSIONS = {};
        let DEFAULT_CLASS_DIMENSION = { w: 1.0, h: 1.0, d: 1.0 }; // Fallback before WS connects

        const COL_NORMAL    = 0x2196F3;  // blue   — front/neutral objects
        const COL_BACK      = 0xFFC107;  // yellow — back objects
        const COL_COLLISION = 0xF44336;  // red    — collision alert
        const COL_BLINDSPOT = 0xFF9800;  // orange — blind spot
        const COL_HUMAN     = 0x9C27B0;  // purple — pedestrian / person

        let HUMAN_CLASSES = new Set();

        function isHuman(obj) { return HUMAN_CLASSES.has(obj.name); }

        function objectColor(obj) {
            if (obj.front_collision || obj.back_collision) return COL_COLLISION;
            if (obj.blind_spot) return COL_BLINDSPOT;
            if (isHuman(obj)) return COL_HUMAN;
            if (obj.world_y < 0) return COL_BACK;
            return COL_NORMAL;
        }
        
        // Traffic sign dimensions
        // Values dynamically overwritten by WebSocket config
        let SIGN_DIMENSIONS = {};
        let DEFAULT_SIGN_DIMENSION = { w: 0.6, h: 2.0, d: 0.05, color: 0x888888 }; // Fallback before WS connects

        let renderMode = '2d'; // '3d' or '2d'
        
        // ── 2D Canvas Setup ──────────────────────────────────────────────────
        const canvas2d = document.getElementById('canvas-2d');
        const ctx = canvas2d.getContext('2d');
        
        // 2D Pan and Zoom state
        let scale2D = 20; // pixelsPerMeter
        let panX = 0;
        let panY = 0;
        let isDragging2D = false;
        let lastMouseX = 0;
        let lastMouseY = 0;

        function resizeCanvas2D() {
            canvas2d.width = window.innerWidth;
            canvas2d.height = window.innerHeight;
            // Reset pan to center on resize
            panX = canvas2d.width / 2;
            panY = canvas2d.height * 0.75;
        }
        
        // Initialize canvas size and pan offsets
        canvas2d.width = window.innerWidth;
        canvas2d.height = window.innerHeight;
        panX = canvas2d.width / 2;
        panY = canvas2d.height * 0.75;

        // 2D Controls Event Listeners
        canvas2d.addEventListener('mousedown', (e) => {
            isDragging2D = true;
            lastMouseX = e.clientX;
            lastMouseY = e.clientY;
        });

        canvas2d.addEventListener('mousemove', (e) => {
            if (isDragging2D) {
                const dx = e.clientX - lastMouseX;
                const dy = e.clientY - lastMouseY;
                panX += dx;
                panY += dy;
                lastMouseX = e.clientX;
                lastMouseY = e.clientY;
            }
        });

        canvas2d.addEventListener('mouseup', () => {
            isDragging2D = false;
        });
        
        canvas2d.addEventListener('mouseleave', () => {
            isDragging2D = false;
        });

        canvas2d.addEventListener('wheel', (e) => {
            e.preventDefault();
            // Zoom factor
            const zoomAmount = 0.1;
            const direction = e.deltaY < 0 ? 1 : -1;
            
            // Get mouse position relative to canvas
            const mouseX = e.clientX;
            const mouseY = e.clientY;
            
            // Calculate mouse position relative to the current pan offset
            const oldScale = scale2D;
            const newScale = Math.max(5, Math.min(100, scale2D * (1 + direction * zoomAmount)));
            
            // Adjust pan so we zoom in/out centering around the mouse cursor
            const scaleRatio = newScale / oldScale;
            panX = mouseX - (mouseX - panX) * scaleRatio;
            panY = mouseY - (mouseY - panY) * scaleRatio;
            
            scale2D = newScale;
        }, { passive: false });

        function draw2DScene(data, signs) {
            ctx.clearRect(0, 0, canvas2d.width, canvas2d.height);
            
            const cx = panX;
            const cy = panY;
            
            // Draw Grid
            if (showGrid) {
                ctx.strokeStyle = '#222';
                ctx.lineWidth = 1;
                ctx.beginPath();
                // Vertical lines (fixed grid bounds based on arbitrary large sizes)
                for (let x = -100; x <= 100; x += 5) {
                    ctx.moveTo(cx + x * scale2D, -canvas2d.height * 2);
                    ctx.lineTo(cx + x * scale2D, canvas2d.height * 2);
                }
                // Horizontal lines
                for (let y = -50; y <= 150; y += 5) {
                    ctx.moveTo(-canvas2d.width * 2, cy - y * scale2D);
                    ctx.lineTo(canvas2d.width * 2, cy - y * scale2D);
                }
                ctx.stroke();
            }

            // Draw Lane
            ctx.strokeStyle = '#1565C0';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(cx - LANE_HALF_WIDTH * scale2D, -canvas2d.height * 2);
            ctx.lineTo(cx - LANE_HALF_WIDTH * scale2D, canvas2d.height * 2);
            ctx.moveTo(cx + LANE_HALF_WIDTH * scale2D, -canvas2d.height * 2);
            ctx.lineTo(cx + LANE_HALF_WIDTH * scale2D, canvas2d.height * 2);
            ctx.stroke();
            
            // Draw Trails
            if (showTrails) {
                trails.forEach(trail => {
                    ctx.beginPath();
                    ctx.strokeStyle = `rgba(255, 255, 255, 0.4)`;
                    ctx.lineWidth = 2;
                    let first = true;
                    trail.positions.forEach(pos => {
                        const px = cx + pos.x * scale2D;
                        const py = cy + pos.z * scale2D; // z is -y in 3D
                        if (first) { ctx.moveTo(px, py); first = false; }
                        else { ctx.lineTo(px, py); }
                    });
                    ctx.stroke();
                });
            }

            // Draw Traffic Signs
            signs.forEach(sign => {
                const px = cx + sign.world_x * scale2D;
                const py = cy - sign.world_y * scale2D;
                
                const dims = SIGN_DIMENSIONS[sign.name] || DEFAULT_SIGN_DIMENSION;
                ctx.fillStyle = '#' + dims.color.toString(16).padStart(6, '0');
                
                // Draw pole and sign
                ctx.beginPath();
                ctx.arc(px, py, Math.max(3, 6 * (scale2D/20)), 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 1;
                ctx.stroke();

                if (showLabels) {
                    ctx.fillStyle = '#fff';
                    ctx.font = '12px Arial';
                    ctx.textAlign = 'center';
                    ctx.fillText(sign.name, px, py - 12 * (scale2D/20));
                }
            });

            // Draw Tracked Objects
            data.forEach(obj => {
                const px = cx + obj.world_x * scale2D;
                const py = cy - obj.world_y * scale2D;
                const dims = CLASS_DIMENSIONS[obj.name] || DEFAULT_CLASS_DIMENSION;
                
                const w = dims.w * scale2D;
                const h = dims.d * scale2D; // Use depth for length in top-down view
                
                const colorHex = objectColor(obj);
                const isHumanObj = isHuman(obj);
                
                ctx.save();
                ctx.translate(px, py);
                
                // Draw Box
                ctx.fillStyle = '#' + colorHex.toString(16).padStart(6, '0');
                ctx.globalAlpha = obj.state === 'tentative' ? 0.45 : 0.82;
                
                if (obj.front_collision || obj.back_collision) {
                    if (flashState) ctx.globalAlpha = 1.0;
                }
                
                ctx.fillRect(-w/2, -h/2, w, h);
                
                // Outline
                ctx.strokeStyle = isHumanObj ? '#9C27B0' : '#fff';
                ctx.lineWidth = isHumanObj ? 3 : 1;
                ctx.globalAlpha = 1.0;
                ctx.strokeRect(-w/2, -h/2, w, h);
                
                ctx.restore();

                if (showLabels) {
                    const isCollision = obj.front_collision || obj.back_collision;
                    ctx.fillStyle = '#' + colorHex.toString(16).padStart(6, '0');
                    ctx.font = 'bold 12px Arial';
                    ctx.textAlign = 'center';
                    const text = isCollision ? `⚠ ${obj.name} #${obj.id}` : `${obj.name} #${obj.id}`;
                    ctx.fillText(text, px, py - h/2 - 5);
                }
            });

            // Draw Ego Bike
            ctx.fillStyle = '#00ff00';
            ctx.fillRect(cx - 0.3 * scale2D, cy - 0.9 * scale2D, 0.6 * scale2D, 1.8 * scale2D);
            ctx.strokeStyle = '#fff';
            ctx.strokeRect(cx - 0.3 * scale2D, cy - 0.9 * scale2D, 0.6 * scale2D, 1.8 * scale2D);
        }
        // ─────────────────────────────────────────────────────────────────────

        let scene, camera, renderer, controls, gridHelper;
        let webglSupported = false;

        try {
            const canvas = document.createElement('canvas');
            if (window.WebGLRenderingContext && (canvas.getContext('webgl') || canvas.getContext('experimental-webgl'))) {
                webglSupported = true;
            }
        } catch (e) {
            console.warn("WebGL support check failed", e);
        }

        if (webglSupported) {
            try {
                // Scene setup
                scene = new THREE.Scene();
                scene.background = new THREE.Color(0x0a0a0a);
                scene.fog = new THREE.Fog(0x0a0a0a, 10, 50);

                camera = new THREE.PerspectiveCamera(
                    60,
                    window.innerWidth / window.innerHeight,
                    0.1,
                    1000
                );
                camera.position.set(0, 15, 10);
                camera.lookAt(0, 0, 0);

                renderer = new THREE.WebGLRenderer({ antialias: true });
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.shadowMap.enabled = true;
                renderer.shadowMap.type = THREE.PCFSoftShadowMap;
                document.getElementById('canvas-container').appendChild(renderer.domElement);

                controls = new OrbitControls(camera, renderer.domElement);
                controls.enableDamping = true;
                controls.dampingFactor = 0.05;
                controls.maxPolarAngle = Math.PI / 2 - 0.1;

                // Lighting
                const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
                scene.add(ambientLight);

                const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
                directionalLight.position.set(10, 20, 10);
                directionalLight.castShadow = true;
                directionalLight.shadow.camera.left = -30;
                directionalLight.shadow.camera.right = 30;
                directionalLight.shadow.camera.top = 30;
                directionalLight.shadow.camera.bottom = -30;
                directionalLight.shadow.mapSize.width = 2048;
                directionalLight.shadow.mapSize.height = 2048;
                scene.add(directionalLight);

                // Ground plane
                const groundGeometry = new THREE.PlaneGeometry(100, 100);
                const groundMaterial = new THREE.MeshStandardMaterial({
                    color: 0x1a1a1a,
                    roughness: 0.8,
                    metalness: 0.2
                });
                const ground = new THREE.Mesh(groundGeometry, groundMaterial);
                ground.rotation.x = -Math.PI / 2;
                ground.receiveShadow = true;
                scene.add(ground);

                // Grid
                gridHelper = new THREE.GridHelper(100, 100, 0x333333, 0x222222);
                scene.add(gridHelper);

                // Bike/ego vehicle (at origin)
                const bikeGeometry = new THREE.BoxGeometry(0.6, 1.2, 1.8);
                const bikeMaterial = new THREE.MeshStandardMaterial({
                    color: 0x00ff00,
                    emissive: 0x00ff00,
                    emissiveIntensity: 0.3
                });
                const bike = new THREE.Mesh(bikeGeometry, bikeMaterial);
                bike.position.y = 0.6;
                bike.castShadow = true;
                scene.add(bike);

                // Coordinate axes at origin
                const axesHelper = new THREE.AxesHelper(5);
                scene.add(axesHelper);
            } catch (e) {
                console.warn("Error initializing Three.js", e);
                webglSupported = false;
            }
        }

        if (!webglSupported) {
            console.log("Falling back to 2D mode");
            renderMode = '2d';
            canvas2d.style.display = 'block';
            document.getElementById('toggle-mode').style.display = 'none';
            document.getElementById('reset-camera').style.display = 'none';
            document.getElementById('toggle-grid').style.display = 'none';
            document.getElementById('toggle-labels').style.display = 'none';
            document.getElementById('toggle-trails').style.display = 'none';
        }

        // Object tracking
        const trackedObjects = new Map();
        const trafficSigns = new Map();
        const trails = new Map();
        let showLabels = true;
        let showTrails = false;
        let showGrid = true;
        
        // UI Controls
        const minimizeBtn = document.getElementById('minimize-btn');
        const infoContent = document.getElementById('info-content');
        
        minimizeBtn.addEventListener('click', () => {
            infoContent.classList.toggle('minimized');
            minimizeBtn.textContent = infoContent.classList.contains('minimized') ? '▲' : '▼';
        });

        // Lane corridor — two parallel blue lines + forward arrows
        const LANE_HALF_WIDTH = 1.0;  // must match system.py
        const LANE_LENGTH     = 30;   // metres drawn ahead and behind
        const laneGroup = new THREE.Group();

        function buildLane() {
            if (!webglSupported) return;
            const lineMat = new THREE.LineBasicMaterial({ color: 0x1565C0, linewidth: 2 });

            // Left line
            const lGeo = new THREE.BufferGeometry().setFromPoints([
                new THREE.Vector3(-LANE_HALF_WIDTH, 0.02, -LANE_LENGTH),
                new THREE.Vector3(-LANE_HALF_WIDTH, 0.02,  LANE_LENGTH)
            ]);
            laneGroup.add(new THREE.Line(lGeo, lineMat));

            // Right line
            const rGeo = new THREE.BufferGeometry().setFromPoints([
                new THREE.Vector3( LANE_HALF_WIDTH, 0.02, -LANE_LENGTH),
                new THREE.Vector3( LANE_HALF_WIDTH, 0.02,  LANE_LENGTH)
            ]);
            laneGroup.add(new THREE.Line(rGeo, lineMat));

            // Forward arrows along centre (every 5 m, pointing -z = forward)
            const arrowMat = new THREE.LineBasicMaterial({ color: 0x42A5F5, linewidth: 1 });
            for (let z = -LANE_LENGTH + 5; z < 0; z += 5) {
                const pts = [
                    new THREE.Vector3( 0,      0.02, z + 1.2),
                    new THREE.Vector3( 0,      0.02, z),
                    new THREE.Vector3(-0.3,    0.02, z + 0.6),
                    new THREE.Vector3( 0,      0.02, z),
                    new THREE.Vector3( 0.3,    0.02, z + 0.6),
                    new THREE.Vector3( 0,      0.02, z),
                ];
                const geo = new THREE.BufferGeometry().setFromPoints(pts);
                laneGroup.add(new THREE.Line(geo, arrowMat));
            }
            scene.add(laneGroup);
        }
        buildLane();

        // Back radar cone: ±20° fan drawn on the ground behind the bike
        function buildBackCone() {
            if (!webglSupported) return;
            const CONE_RANGE = 20;   // metres depth
            const CONE_ANGLE = 20;   // degrees half-angle
            const segments   = 24;
            const angleRad   = THREE.MathUtils.degToRad(CONE_ANGLE);

            const coneMat = new THREE.MeshBasicMaterial({
                color: 0xFFA726,
                transparent: true,
                opacity: 0.10,
                side: THREE.DoubleSide,
                depthWrite: false
            });
            const edgeMat = new THREE.LineBasicMaterial({
                color: 0xFFA726,
                transparent: true,
                opacity: 0.55
            });

            // Build fan vertices in XZ plane (back = +z in Three.js)
            const verts = [0, 0.012, 0];
            for (let i = 0; i <= segments; i++) {
                const a = -angleRad + (2 * angleRad * i / segments);
                verts.push(Math.sin(a) * CONE_RANGE, 0.012, Math.cos(a) * CONE_RANGE);
            }
            const indices = [];
            for (let i = 0; i < segments; i++) {
                indices.push(0, i + 1, i + 2);
            }
            const fanGeo = new THREE.BufferGeometry();
            fanGeo.setAttribute('position', new THREE.Float32BufferAttribute(verts, 3));
            fanGeo.setIndex(indices);
            fanGeo.computeVertexNormals();
            scene.add(new THREE.Mesh(fanGeo, coneMat));

            // Left and right bounding rays
            const leftAngle  = -angleRad;
            const rightAngle =  angleRad;
            const leftGeo  = new THREE.BufferGeometry().setFromPoints([
                new THREE.Vector3(0, 0.015, 0),
                new THREE.Vector3(Math.sin(leftAngle)  * CONE_RANGE, 0.015, Math.cos(leftAngle)  * CONE_RANGE)
            ]);
            const rightGeo = new THREE.BufferGeometry().setFromPoints([
                new THREE.Vector3(0, 0.015, 0),
                new THREE.Vector3(Math.sin(rightAngle) * CONE_RANGE, 0.015, Math.cos(rightAngle) * CONE_RANGE)
            ]);
            scene.add(new THREE.Line(leftGeo,  edgeMat));
            scene.add(new THREE.Line(rightGeo, edgeMat));

            // Arc at far end
            const arcPts = [];
            for (let i = 0; i <= segments; i++) {
                const a = -angleRad + (2 * angleRad * i / segments);
                arcPts.push(new THREE.Vector3(
                    Math.sin(a) * CONE_RANGE, 0.015, Math.cos(a) * CONE_RANGE
                ));
            }
            scene.add(new THREE.Line(
                new THREE.BufferGeometry().setFromPoints(arcPts), edgeMat
            ));
        }
        buildBackCone();

        // Create object mesh
        function createObjectMesh(objData) {
            const dims  = CLASS_DIMENSIONS[objData.name] || DEFAULT_CLASS_DIMENSION;
            const color = objectColor(objData);
            const human = isHuman(objData);
            
            const geometry = new THREE.BoxGeometry(dims.w, dims.h, dims.d);
            const material = new THREE.MeshStandardMaterial({
                color,
                transparent: true,
                opacity: objData.state === 'tentative' ? 0.45 : 0.82,
                emissive: color,
                emissiveIntensity: human ? 0.5 : 0.25
            });
            
            const mesh = new THREE.Mesh(geometry, material);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            
            // Position: BEV coordinates are (x, y) in ground plane
            // Three.js: x=x, y=height/2, z=-y (flip y to z, negate for forward)
            mesh.position.set(objData.world_x, dims.h / 2, -objData.world_y);
            
            // Wireframe outline — thicker + brighter purple for humans
            const edges = new THREE.EdgesGeometry(geometry);
            const lineMaterial = new THREE.LineBasicMaterial({
                color: human ? COL_HUMAN : 0xffffff,
                transparent: true,
                opacity: human ? 0.95 : 0.3
            });
            const wireframe = new THREE.LineSegments(edges, lineMaterial);
            mesh.add(wireframe);

            // Extra scaled outline shell for humans (halo effect)
            if (human) {
                const outlineGeo = new THREE.BoxGeometry(
                    dims.w * 1.18, dims.h * 1.08, dims.d * 1.18
                );
                const outlineMat = new THREE.MeshBasicMaterial({
                    color: COL_HUMAN,
                    side: THREE.BackSide,
                    transparent: true,
                    opacity: 0.35
                });
                const outline = new THREE.Mesh(outlineGeo, outlineMat);
                mesh.add(outline);
            }
            
            return mesh;
        }

        // Create label sprite
        function createLabel(text, color = 0xffffff) {
            const canvas = document.createElement('canvas');
            const context = canvas.getContext('2d');
            canvas.width = 256;
            canvas.height = 64;
            
            context.fillStyle = 'rgba(0, 0, 0, 0.6)';
            context.fillRect(0, 0, canvas.width, canvas.height);
            
            context.font = 'Bold 24px Arial';
            context.fillStyle = `#${color.toString(16).padStart(6, '0')}`;
            context.textAlign = 'center';
            context.textBaseline = 'middle';
            context.fillText(text, canvas.width / 2, canvas.height / 2);
            
            const texture = new THREE.CanvasTexture(canvas);
            const spriteMaterial = new THREE.SpriteMaterial({ map: texture });
            const sprite = new THREE.Sprite(spriteMaterial);
            sprite.scale.set(2, 0.5, 1);
            
            return sprite;
        }
        
        // Create traffic sign mesh (pole + sign board)
        function createSignMesh(signData) {
            const dims = SIGN_DIMENSIONS[signData.name] || SIGN_DIMENSIONS['unknown_sign'];
            
            const group = new THREE.Group();
            
            // Pole (thin cylinder)
            const poleGeometry = new THREE.CylinderGeometry(0.05, 0.05, 1.5, 8);
            const poleMaterial = new THREE.MeshStandardMaterial({
                color: 0x666666,
                metalness: 0.5,
                roughness: 0.5
            });
            const pole = new THREE.Mesh(poleGeometry, poleMaterial);
            pole.position.y = 0.75;
            pole.castShadow = true;
            group.add(pole);
            
            // Sign board (flat rectangle at top)
            const signGeometry = new THREE.BoxGeometry(dims.w, dims.w, dims.d);
            const signMaterial = new THREE.MeshStandardMaterial({
                color: dims.color,
                emissive: dims.color,
                emissiveIntensity: 0.3,
                metalness: 0.1,
                roughness: 0.3
            });
            const signBoard = new THREE.Mesh(signGeometry, signMaterial);
            signBoard.position.y = 1.8;
            signBoard.castShadow = true;
            
            // Border for sign
            const edges = new THREE.EdgesGeometry(signGeometry);
            const lineMaterial = new THREE.LineBasicMaterial({
                color: 0x000000,
                linewidth: 2
            });
            const border = new THREE.LineSegments(edges, lineMaterial);
            signBoard.add(border);
            
            group.add(signBoard);
            
            // Position in world
            group.position.set(signData.world_x, 0, -signData.world_y);
            
            return group;
        }

        // Flashing state for collision objects
        let flashState = false;
        setInterval(() => { flashState = !flashState; }, 400);

        // Update tracked objects
        function updateObjects(data) {
            if (!webglSupported) return;
            const currentIds = new Set();
            
            data.forEach(obj => {
                currentIds.add(obj.id);
                const color  = objectColor(obj);
                const dims   = CLASS_DIMENSIONS[obj.name] || CLASS_DIMENSIONS['misc'];
                const isCollision = obj.front_collision || obj.back_collision;
                
                if (trackedObjects.has(obj.id)) {
                    // Update existing object
                    const tracked = trackedObjects.get(obj.id);
                    
                    // Smooth position update
                    tracked.mesh.position.x = obj.world_x;
                    tracked.mesh.position.z = -obj.world_y;
                    
                    // Update colour + flash
                    tracked.mesh.material.color.setHex(color);
                    tracked.mesh.material.emissive.setHex(color);
                    tracked.mesh.material.emissiveIntensity = isCollision && flashState ? 0.9 : 0.25;
                    tracked.mesh.material.opacity = obj.state === 'tentative' ? 0.45 : 0.82;
                    
                    // Update label
                    if (tracked.label) {
                        tracked.label.position.copy(tracked.mesh.position);
                        tracked.label.position.y = dims.h + 0.5;
                    }
                    
                    // Update trail
                    if (showTrails && trails.has(obj.id)) {
                        const trail = trails.get(obj.id);
                        trail.positions.push(new THREE.Vector3(obj.world_x, 0.1, -obj.world_y));
                        if (trail.positions.length > 50) trail.positions.shift();
                        
                        const points = trail.positions;
                        const geometry = new THREE.BufferGeometry().setFromPoints(points);
                        trail.line.geometry.dispose();
                        trail.line.geometry = geometry;
                    }
                } else {
                    // Create new object
                    const mesh = createObjectMesh(obj);
                    scene.add(mesh);
                    
                    const labelText = isCollision ? `⚠ ${obj.name} #${obj.id}` : `${obj.name} #${obj.id}`;
                    const label = createLabel(labelText, color);
                    label.position.set(obj.world_x, dims.h + 0.5, -obj.world_y);
                    if (showLabels) scene.add(label);
                    
                    trackedObjects.set(obj.id, { mesh, label, data: obj });
                    
                    // Create trail
                    if (showTrails) {
                        const positions = [new THREE.Vector3(obj.world_x, 0.1, -obj.world_y)];
                        const geometry = new THREE.BufferGeometry().setFromPoints(positions);
                        const material = new THREE.LineBasicMaterial({
                            color,
                            transparent: true,
                            opacity: 0.5
                        });
                        const line = new THREE.Line(geometry, material);
                        scene.add(line);
                        trails.set(obj.id, { line, positions });
                    }
                }
            });
            
            // Remove objects that are no longer tracked
            trackedObjects.forEach((tracked, id) => {
                if (!currentIds.has(id)) {
                    scene.remove(tracked.mesh);
                    if (tracked.label) scene.remove(tracked.label);
                    tracked.mesh.geometry.dispose();
                    tracked.mesh.material.dispose();
                    trackedObjects.delete(id);
                    
                    if (trails.has(id)) {
                        const trail = trails.get(id);
                        scene.remove(trail.line);
                        trail.line.geometry.dispose();
                        trail.line.material.dispose();
                        trails.delete(id);
                    }
                }
            });
        }

        // Update traffic signs
        function updateSigns(signs) {
            if (!webglSupported) return;
            const currentIds = new Set();
            
            signs.forEach(sign => {
                const signKey = `sign_${sign.id}`;
                currentIds.add(signKey);
                
                if (trafficSigns.has(signKey)) {
                    // Update existing sign position
                    const signObj = trafficSigns.get(signKey);
                    signObj.mesh.position.x = sign.world_x;
                    signObj.mesh.position.z = -sign.world_y;
                    
                    if (signObj.label) {
                        signObj.label.position.set(sign.world_x, 2.5, -sign.world_y);
                    }
                } else {
                    // Create new sign
                    const mesh = createSignMesh(sign);
                    scene.add(mesh);
                    
                    const dims = SIGN_DIMENSIONS[sign.name] || SIGN_DIMENSIONS['unknown_sign'];
                    const label = createLabel(sign.name, dims.color);
                    label.position.set(sign.world_x, 2.5, -sign.world_y);
                    if (showLabels) scene.add(label);
                    
                    trafficSigns.set(signKey, { mesh, label, data: sign });
                }
            });
            
            // Remove signs that are no longer detected
            trafficSigns.forEach((signObj, key) => {
                if (!currentIds.has(key)) {
                    scene.remove(signObj.mesh);
                    if (signObj.label) scene.remove(signObj.label);
                    trafficSigns.delete(key);
                }
            });
        }

        // Update info panel
        function updateInfoPanel(data, signs) {
            const confirmed = data.filter(obj => obj.state === 'confirmed');
            const tentative = data.filter(obj => obj.state === 'tentative');
            
            document.getElementById('object-count').textContent = 
                `${confirmed.length} confirmed, ${tentative.length} tentative`;
            
            const objectsList = document.getElementById('objects-list');
            objectsList.innerHTML = '';
            
            [...confirmed, ...tentative].forEach(obj => {
                const isCollision = obj.front_collision || obj.back_collision;
                const isBack      = obj.world_y < 0;
                let cls = `object-item ${obj.state}`;
                if (isCollision) cls += ' collision';
                else if (obj.blind_spot) cls += ' blindspot';
                else if (isBack) cls += ' back-obj';

                const div = document.createElement('div');
                div.className = cls;
                
                const speed = Math.sqrt(obj.vx * obj.vx + obj.vy * obj.vy);
                
                const radarSpeedStr = obj.radar_speed != null
                    ? `${obj.radar_speed.toFixed(1)} km/h ${obj.radar_direction ? '▼ approaching' : '▲ receding'}`
                    : '—';

                const collisionTag = obj.front_collision ? ' 🔴 FRONT COLLISION'
                                   : obj.back_collision  ? ' 🔴 BACK COLLISION'
                                   : obj.blind_spot      ? ' 🟠 BLIND SPOT'
                                   : '';
                div.innerHTML = `
                    <div class="object-header">
                        <span class="object-name">${obj.name}${collisionTag}</span>
                        <span class="object-id">ID: ${obj.id}</span>
                    </div>
                    <div class="object-details">
                        Side: ${obj.world_y >= 0 ? 'front' : 'back'} &nbsp;
                        Pos: (${obj.world_x.toFixed(2)}, ${obj.world_y.toFixed(2)})m<br>
                        Tracker vel: ${speed.toFixed(2)} m/s<br>
                        Radar speed: ${radarSpeedStr}<br>
                        Confidence: ${obj.confidence.toFixed(2)} &nbsp; Hits: ${obj.hits}
                    </div>
                `;
                
                objectsList.appendChild(div);
            });
            
            // Traffic signs section
            if (signs && signs.length > 0) {
                const signsHeader = document.createElement('div');
                signsHeader.style.cssText = 'margin-top:15px;font-weight:bold;color:#FFD700;';
                signsHeader.textContent = `Traffic Signs (${signs.length})`;
                objectsList.appendChild(signsHeader);
                
                signs.forEach(sign => {
                    const div = document.createElement('div');
                    div.className = 'object-item';
                    div.style.borderLeftColor = '#FFD700';
                    div.style.background = 'rgba(255, 215, 0, 0.1)';
                    
                    div.innerHTML = `
                        <div class="object-header">
                            <span class="object-name" style="color:#FFD700;">${sign.name}</span>
                            <span class="object-id">ID: ${sign.id}</span>
                        </div>
                        <div class="object-details">
                            Pos: (${sign.world_x.toFixed(2)}, ${sign.world_y.toFixed(2)})m<br>
                            Confidence: ${sign.confidence.toFixed(2)}
                        </div>
                    `;
                    
                    objectsList.appendChild(div);
                });
            }
        }
        
        function updateTopRightSign(signs) {
            const container = document.getElementById('top-right-sign');
            const iconEl = document.getElementById('top-right-sign-icon');
            const nameEl = document.getElementById('top-right-sign-name');
            
            if (signs && signs.length > 0) {
                // Just grab the first sign (or highest confidence)
                const mainSign = signs[0];
                container.style.display = 'block';
                nameEl.textContent = mainSign.name;
                
                // Set simple icon matching the name if possible
                let icon = '🛑';
                const name = mainSign.name.toLowerCase();
                if (name.includes('speed limit')) icon = '3️⃣0️⃣';
                else if (name.includes('yield') || name.includes('give way')) icon = '⚠️';
                else if (name.includes('light')) icon = '🚥';
                
                iconEl.textContent = icon;
            } else {
                container.style.display = 'none';
            }
        }

        function updateSpeedPanel(gps) {
            const speedEl = document.getElementById('current-speed');
            const limitEl = document.getElementById('speed-limit');
            
            if (gps) {
                speedEl.textContent = typeof gps.speed_kmh === 'number' ? Math.round(gps.speed_kmh) : '--';
                limitEl.textContent = typeof gps.speed_limit === 'number' ? gps.speed_limit : '--';
            } else {
                speedEl.textContent = '--';
                limitEl.textContent = '--';
            }
        }
        
        // Update collision warning UI (Right-side Panels & Blind Spots)
        function updateCollisionWarning(tracks) {
            let frontThreat = false;
            let backThreat = false;
            let bsLeft = false;
            let bsRight = false;
            let closestFrontDist = null;
            let closestBackDist = null;
            let frontConf = 0.0;
            let backConf = 0.0;
            
            if (tracks && tracks.length > 0) {
                tracks.forEach(t => {
                    const y = t.world_y;
                    
                    if (t.front_collision) {
                        frontThreat = true;
                        if (closestFrontDist === null || y < closestFrontDist) {
                            closestFrontDist = y;
                            frontConf = t.confidence;
                        }
                    }
                    
                    if (t.back_collision) {
                        backThreat = true;
                        if (closestBackDist === null || Math.abs(y) < closestBackDist) {
                            closestBackDist = Math.abs(y);
                            backConf = t.confidence;
                        }
                    }
                    
                    if (t.blind_spot) {
                        if (t.world_x < 0) bsLeft = true;
                        else bsRight = true;
                    }
                });
            }

            const frontBox = document.getElementById('warning-front');
            const frontInfo = document.getElementById('warning-front-info');
            
            if (frontThreat) {
                frontBox.style.display = 'block';
                if (closestFrontDist !== null) {
                    frontInfo.innerHTML = `Distance: ${closestFrontDist.toFixed(1)}m<br>Confidence: ${(frontConf*100).toFixed(0)}%`;
                }
            } else {
                frontBox.style.display = 'none';
            }
            
            const backBox = document.getElementById('warning-back');
            const backInfo = document.getElementById('warning-back-info');
            
            if (backThreat) {
                backBox.style.display = 'block';
                if (closestBackDist !== null) {
                    backInfo.innerHTML = `Distance: ${closestBackDist.toFixed(1)}m<br>Confidence: ${(backConf*100).toFixed(0)}%`;
                }
            } else {
                backBox.style.display = 'none';
            }
            
            const bsLeftEl = document.getElementById('blind-spot-left');
            const bsRightEl = document.getElementById('blind-spot-right');
            
            if (bsLeft) bsLeftEl.classList.add('active');
            else bsLeftEl.classList.remove('active');
            
            if (bsRight) bsRightEl.classList.add('active');
            else bsRightEl.classList.remove('active');
        }

        // WebSocket connection
        let ws = null;
        let lastUpdateTime = Date.now();
        let updateCount = 0;

        function connectWebSocket() {
            // Use the hostname of the server serving this file, or localhost if opened via file://
            const host = window.location.hostname || 'localhost';
            ws = new WebSocket(`ws://${host}:8765`);
            
            ws.onopen = () => {
                console.log('Connected to tracking system');
                document.getElementById('connection-status').textContent = '● CONNECTED';
                document.getElementById('connection-status').className = 'connection-status connected';
            };
            
            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                
                // Update dimensions if config is present
                if (data.config) {
                    if (data.config.class_dimensions) {
                        CLASS_DIMENSIONS = data.config.class_dimensions;
                    }
                    if (data.config.sign_dimensions) {
                        SIGN_DIMENSIONS = data.config.sign_dimensions;
                    }
                    if (data.config.default_class_dimension) {
                        DEFAULT_CLASS_DIMENSION = data.config.default_class_dimension;
                    }
                    if (data.config.default_sign_dimension) {
                        DEFAULT_SIGN_DIMENSION = data.config.default_sign_dimension;
                    }
                    if (data.config.human_class) {
                        HUMAN_CLASSES = new Set(data.config.human_class);
                    }
                }
                
                updateObjects(data.tracks);
                updateSigns(data.signs || []);
                updateTopRightSign(data.signs || []);
                updateInfoPanel(data.tracks, data.signs || []);
                updateCollisionWarning(data.tracks || []);
                updateSpeedPanel(data.gps);
                
                if (renderMode === '2d') {
                    draw2DScene(data.tracks, data.signs || []);
                }
                
                // Update rate calculation
                updateCount++;
                const now = Date.now();
                if (now - lastUpdateTime > 1000) {
                    const rate = updateCount / ((now - lastUpdateTime) / 1000);
                    document.getElementById('update-rate').textContent = `${rate.toFixed(1)} Hz`;
                    updateCount = 0;
                    lastUpdateTime = now;
                }
            };
            
            ws.onclose = () => {
                console.log('Disconnected from tracking system');
                document.getElementById('connection-status').textContent = '● DISCONNECTED';
                document.getElementById('connection-status').className = 'connection-status disconnected';
                setTimeout(connectWebSocket, 2000);
            };
            
            ws.onerror = (error) => {
                console.error('WebSocket error:', error);
            };
        }

        // Controls
        document.getElementById('reset-camera').addEventListener('click', () => {
            if (!webglSupported) return;
            camera.position.set(0, 15, 10);
            camera.lookAt(0, 0, 0);
            controls.target.set(0, 0, 0);
        });

        document.getElementById('toggle-grid').addEventListener('click', () => {
            showGrid = !showGrid;
            if (webglSupported && gridHelper) gridHelper.visible = showGrid;
        });

        document.getElementById('toggle-labels').addEventListener('click', () => {
            showLabels = !showLabels;
            if (!webglSupported) return;
            trackedObjects.forEach(tracked => {
                if (tracked.label) {
                    tracked.label.visible = showLabels;
                }
            });
        });

        document.getElementById('toggle-trails').addEventListener('click', () => {
            showTrails = !showTrails;
            if (!webglSupported) return;
            if (!showTrails) {
                trails.forEach(trail => {
                    scene.remove(trail.line);
                    trail.line.geometry.dispose();
                    trail.line.material.dispose();
                });
                trails.clear();
            }
        });

        // Mode Toggle Logic
        const toggleModeBtn = document.getElementById('toggle-mode');
        toggleModeBtn.addEventListener('click', () => {
            if (renderMode === '3d') {
                renderMode = '2d';
                toggleModeBtn.textContent = 'Switch to 3D Mode';
                canvas2d.style.display = 'block';
                renderer.domElement.style.display = 'none';
            } else {
                renderMode = '3d';
                toggleModeBtn.textContent = 'Switch to 2D Mode';
                canvas2d.style.display = 'none';
                renderer.domElement.style.display = 'block';
            }
        });

        // Handle window resize
        window.addEventListener('resize', () => {
            resizeCanvas2D();
            if (webglSupported) {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }
        });

        // Animation loop
        function animate() {
            requestAnimationFrame(animate);
            if (webglSupported && renderMode === '3d') {
                controls.update();
                renderer.render(scene, camera);
            }
            // 2D is drawn immediately on websocket message, so no constant render loop needed for 2D,
            // except for flashing animations, which could be handled by forcing a redraw, but we will leave it simple for now.
        }

        // Start
        connectWebSocket();
        animate();
    </script>
</body>
</html>
