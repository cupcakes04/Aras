<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARAS - 3D Object Tracking Visualization</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0a0a;
            color: #fff;
            overflow: hidden;
        }
        
        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }
        
        #info-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.8);
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #333;
            min-width: 300px;
            max-height: 80vh;
            overflow-y: auto;
            font-size: 14px;
            backdrop-filter: blur(10px);
        }
        
        #info-panel h2 {
            margin-bottom: 15px;
            color: #4CAF50;
            font-size: 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #minimize-btn {
            background: none;
            border: none;
            color: #888;
            cursor: pointer;
            font-size: 16px;
            padding: 0 5px;
        }
        
        #minimize-btn:hover {
            color: #fff;
        }
        
        #info-content {
            transition: all 0.3s ease;
        }
        
        #info-content.minimized {
            display: none;
        }
        
        .status-item {
            margin-bottom: 10px;
            padding: 8px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
        }
        
        .status-label {
            color: #888;
            font-size: 12px;
            text-transform: uppercase;
        }
        
        .status-value {
            color: #fff;
            font-weight: bold;
            margin-top: 4px;
        }
        
        .object-item {
            margin: 8px 0;
            padding: 10px;
            background: rgba(33, 150, 243, 0.1);
            border-left: 3px solid #2196F3;
            border-radius: 4px;
        }
        
        .object-item.tentative {
            background: rgba(33, 150, 243, 0.06);
            border-left-color: #64B5F6;
        }

        .object-item.back-obj {
            background: rgba(255, 193, 7, 0.1);
            border-left-color: #FFC107;
        }

        .object-item.collision {
            background: rgba(244, 67, 54, 0.18);
            border-left-color: #F44336;
            animation: flash 0.5s infinite alternate;
        }

        @keyframes flash {
            from { background: rgba(244, 67, 54, 0.18); }
            to   { background: rgba(244, 67, 54, 0.45); }
        }
        
        .object-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
        }
        
        .object-name {
            font-weight: bold;
            color: #2196F3;
        }
        
        .object-item.tentative .object-name {
            color: #64B5F6;
        }

        .object-item.back-obj .object-name {
            color: #FFC107;
        }

        .object-item.collision .object-name {
            color: #F44336;
        }
        
        .object-id {
            color: #888;
            font-size: 12px;
        }
        
        .object-details {
            font-size: 12px;
            color: #ccc;
        }
        
        #controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.8);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #333;
            backdrop-filter: blur(10px);
        }
        
        .control-group {
            margin: 10px 0;
        }
        
        .control-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 12px;
            color: #888;
        }
        
        button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            margin-right: 5px;
        }
        
        button:hover {
            background: #45a049;
        }
        
        button.secondary {
            background: #555;
        }
        
        button.secondary:hover {
            background: #666;
        }
        
        .connection-status {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }
        
        .connection-status.connected {
            background: rgba(76, 175, 80, 0.3);
            border: 1px solid #4CAF50;
            color: #4CAF50;
        }
        
        .connection-status.disconnected {
            background: rgba(244, 67, 54, 0.3);
            border: 1px solid #f44336;
            color: #f44336;
        }
        
        #collision-warning {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 0, 0, 0.9);
            padding: 30px 50px;
            border-radius: 12px;
            border: 3px solid #ff0000;
            font-size: 32px;
            font-weight: bold;
            color: #fff;
            text-align: center;
            display: none;
            animation: pulse 0.5s infinite alternate;
            z-index: 1000;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.8);
        }
        
        @keyframes pulse {
            from { opacity: 0.8; transform: translate(-50%, -50%) scale(1); }
            to { opacity: 1; transform: translate(-50%, -50%) scale(1.05); }
        }
        
        #collision-indicators {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
            z-index: 100;
        }
        
        .collision-indicator {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(100, 100, 100, 0.3);
            border: 3px solid #555;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
            color: #888;
            transition: all 0.3s;
        }
        
        .collision-indicator.active {
            background: rgba(255, 0, 0, 0.8);
            border-color: #ff0000;
            color: #fff;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.8);
            animation: vibrate 0.1s infinite;
        }
        
        @keyframes vibrate {
            0%, 100% { transform: translate(0, 0); }
            25% { transform: translate(-2px, 2px); }
            50% { transform: translate(2px, -2px); }
            75% { transform: translate(-2px, -2px); }
        }
        
        .collision-info {
            position: absolute;
            bottom: 130px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            padding: 15px 25px;
            border-radius: 8px;
            border: 1px solid #333;
            font-size: 14px;
            text-align: center;
            backdrop-filter: blur(10px);
            display: none;
        }
        
        .collision-info.active {
            display: block;
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div class="connection-status disconnected" id="connection-status">
        ● DISCONNECTED
    </div>
    
    <div id="collision-warning">
        ⚠️ COLLISION WARNING ⚠️
    </div>
    
    <div class="collision-info" id="collision-info">
        <div id="collision-distance"></div>
        <div id="collision-confidence"></div>
    </div>
    
    <div id="collision-indicators">
        <div class="collision-indicator" id="indicator-left">
            LEFT
        </div>
        <div class="collision-indicator" id="indicator-front">
            FRONT
        </div>
        <div class="collision-indicator" id="indicator-right">
            RIGHT
        </div>
    </div>
    
    <div id="info-panel">
        <h2>
            ARAS Tracking System
            <button id="minimize-btn" title="Toggle Panel">▼</button>
        </h2>
        <div id="info-content">
            <div class="status-item">
                <div class="status-label">Tracked Objects</div>
                <div class="status-value" id="object-count">0 confirmed, 0 tentative</div>
            </div>
            <div class="status-item">
                <div class="status-label">Update Rate</div>
                <div class="status-value" id="update-rate">0 Hz</div>
            </div>
            <div id="objects-list"></div>
        </div>
    </div>
    
    <div id="controls">
        <div class="control-group">
            <button id="reset-camera">Reset Camera</button>
            <button id="toggle-grid" class="secondary">Toggle Grid</button>
        </div>
        <div class="control-group">
            <button id="toggle-labels" class="secondary">Toggle Labels</button>
            <button id="toggle-trails" class="secondary">Toggle Trails</button>
        </div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
    }
    </script>
    
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { FontLoader } from 'three/addons/loaders/FontLoader.js';
        import { TextGeometry } from 'three/addons/geometries/TextGeometry.js';

        // Object dimensions (width, height, depth in meters)
        // Values dynamically overwritten by WebSocket config
        let CLASS_DIMENSIONS = {};
        let DEFAULT_CLASS_DIMENSION = { w: 1.0, h: 1.0, d: 1.0 }; // Fallback before WS connects

        const COL_NORMAL    = 0x2196F3;  // blue   — front/neutral objects
        const COL_BACK      = 0xFFC107;  // yellow — back objects
        const COL_COLLISION = 0xF44336;  // red    — collision alert
        const COL_HUMAN     = 0x9C27B0;  // purple — pedestrian / person

        let HUMAN_CLASSES = new Set();

        function isHuman(obj) { return HUMAN_CLASSES.has(obj.name); }

        function objectColor(obj) {
            if (obj.front_collision || obj.back_collision) return COL_COLLISION;
            if (isHuman(obj)) return COL_HUMAN;
            if (obj.world_y < 0) return COL_BACK;
            return COL_NORMAL;
        }
        
        // Traffic sign dimensions
        // Values dynamically overwritten by WebSocket config
        let SIGN_DIMENSIONS = {};
        let DEFAULT_SIGN_DIMENSION = { w: 0.6, h: 2.0, d: 0.05, color: 0x888888 }; // Fallback before WS connects

        // Scene setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a0a);
        scene.fog = new THREE.Fog(0x0a0a0a, 10, 50);

        const camera = new THREE.PerspectiveCamera(
            60,
            window.innerWidth / window.innerHeight,
            0.1,
            1000
        );
        camera.position.set(0, 15, 10);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxPolarAngle = Math.PI / 2 - 0.1;

        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(10, 20, 10);
        directionalLight.castShadow = true;
        directionalLight.shadow.camera.left = -30;
        directionalLight.shadow.camera.right = 30;
        directionalLight.shadow.camera.top = 30;
        directionalLight.shadow.camera.bottom = -30;
        directionalLight.shadow.mapSize.width = 2048;
        directionalLight.shadow.mapSize.height = 2048;
        scene.add(directionalLight);

        // Ground plane
        const groundGeometry = new THREE.PlaneGeometry(100, 100);
        const groundMaterial = new THREE.MeshStandardMaterial({
            color: 0x1a1a1a,
            roughness: 0.8,
            metalness: 0.2
        });
        const ground = new THREE.Mesh(groundGeometry, groundMaterial);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // Grid
        const gridHelper = new THREE.GridHelper(100, 100, 0x333333, 0x222222);
        scene.add(gridHelper);

        // Bike/ego vehicle (at origin)
        const bikeGeometry = new THREE.BoxGeometry(0.6, 1.2, 1.8);
        const bikeMaterial = new THREE.MeshStandardMaterial({
            color: 0x00ff00,
            emissive: 0x00ff00,
            emissiveIntensity: 0.3
        });
        const bike = new THREE.Mesh(bikeGeometry, bikeMaterial);
        bike.position.y = 0.6;
        bike.castShadow = true;
        scene.add(bike);

        // Coordinate axes at origin
        const axesHelper = new THREE.AxesHelper(5);
        scene.add(axesHelper);

        // Object tracking
        const trackedObjects = new Map();
        const trafficSigns = new Map();
        const trails = new Map();
        let showLabels = true;
        let showTrails = false;
        let showGrid = true;
        
        // UI Controls
        const minimizeBtn = document.getElementById('minimize-btn');
        const infoContent = document.getElementById('info-content');
        
        minimizeBtn.addEventListener('click', () => {
            infoContent.classList.toggle('minimized');
            minimizeBtn.textContent = infoContent.classList.contains('minimized') ? '▲' : '▼';
        });

        // Lane corridor — two parallel blue lines + forward arrows
        const LANE_HALF_WIDTH = 1.0;  // must match system.py
        const LANE_LENGTH     = 30;   // metres drawn ahead and behind
        const laneGroup = new THREE.Group();

        function buildLane() {
            const lineMat = new THREE.LineBasicMaterial({ color: 0x1565C0, linewidth: 2 });

            // Left line
            const lGeo = new THREE.BufferGeometry().setFromPoints([
                new THREE.Vector3(-LANE_HALF_WIDTH, 0.02, -LANE_LENGTH),
                new THREE.Vector3(-LANE_HALF_WIDTH, 0.02,  LANE_LENGTH)
            ]);
            laneGroup.add(new THREE.Line(lGeo, lineMat));

            // Right line
            const rGeo = new THREE.BufferGeometry().setFromPoints([
                new THREE.Vector3( LANE_HALF_WIDTH, 0.02, -LANE_LENGTH),
                new THREE.Vector3( LANE_HALF_WIDTH, 0.02,  LANE_LENGTH)
            ]);
            laneGroup.add(new THREE.Line(rGeo, lineMat));

            // Forward arrows along centre (every 5 m, pointing -z = forward)
            const arrowMat = new THREE.LineBasicMaterial({ color: 0x42A5F5, linewidth: 1 });
            for (let z = -LANE_LENGTH + 5; z < 0; z += 5) {
                const pts = [
                    new THREE.Vector3( 0,      0.02, z + 1.2),
                    new THREE.Vector3( 0,      0.02, z),
                    new THREE.Vector3(-0.3,    0.02, z + 0.6),
                    new THREE.Vector3( 0,      0.02, z),
                    new THREE.Vector3( 0.3,    0.02, z + 0.6),
                    new THREE.Vector3( 0,      0.02, z),
                ];
                const geo = new THREE.BufferGeometry().setFromPoints(pts);
                laneGroup.add(new THREE.Line(geo, arrowMat));
            }
            scene.add(laneGroup);
        }
        buildLane();

        // Back radar cone: ±20° fan drawn on the ground behind the bike
        function buildBackCone() {
            const CONE_RANGE = 20;   // metres depth
            const CONE_ANGLE = 20;   // degrees half-angle
            const segments   = 24;
            const angleRad   = THREE.MathUtils.degToRad(CONE_ANGLE);

            const coneMat = new THREE.MeshBasicMaterial({
                color: 0xFFA726,
                transparent: true,
                opacity: 0.10,
                side: THREE.DoubleSide,
                depthWrite: false
            });
            const edgeMat = new THREE.LineBasicMaterial({
                color: 0xFFA726,
                transparent: true,
                opacity: 0.55
            });

            // Build fan vertices in XZ plane (back = +z in Three.js)
            const verts = [0, 0.012, 0];
            for (let i = 0; i <= segments; i++) {
                const a = -angleRad + (2 * angleRad * i / segments);
                verts.push(Math.sin(a) * CONE_RANGE, 0.012, Math.cos(a) * CONE_RANGE);
            }
            const indices = [];
            for (let i = 0; i < segments; i++) {
                indices.push(0, i + 1, i + 2);
            }
            const fanGeo = new THREE.BufferGeometry();
            fanGeo.setAttribute('position', new THREE.Float32BufferAttribute(verts, 3));
            fanGeo.setIndex(indices);
            fanGeo.computeVertexNormals();
            scene.add(new THREE.Mesh(fanGeo, coneMat));

            // Left and right bounding rays
            const leftAngle  = -angleRad;
            const rightAngle =  angleRad;
            const leftGeo  = new THREE.BufferGeometry().setFromPoints([
                new THREE.Vector3(0, 0.015, 0),
                new THREE.Vector3(Math.sin(leftAngle)  * CONE_RANGE, 0.015, Math.cos(leftAngle)  * CONE_RANGE)
            ]);
            const rightGeo = new THREE.BufferGeometry().setFromPoints([
                new THREE.Vector3(0, 0.015, 0),
                new THREE.Vector3(Math.sin(rightAngle) * CONE_RANGE, 0.015, Math.cos(rightAngle) * CONE_RANGE)
            ]);
            scene.add(new THREE.Line(leftGeo,  edgeMat));
            scene.add(new THREE.Line(rightGeo, edgeMat));

            // Arc at far end
            const arcPts = [];
            for (let i = 0; i <= segments; i++) {
                const a = -angleRad + (2 * angleRad * i / segments);
                arcPts.push(new THREE.Vector3(
                    Math.sin(a) * CONE_RANGE, 0.015, Math.cos(a) * CONE_RANGE
                ));
            }
            scene.add(new THREE.Line(
                new THREE.BufferGeometry().setFromPoints(arcPts), edgeMat
            ));
        }
        buildBackCone();

        // Create object mesh
        function createObjectMesh(objData) {
            const dims  = CLASS_DIMENSIONS[objData.name] || DEFAULT_CLASS_DIMENSION;
            const color = objectColor(objData);
            const human = isHuman(objData);
            
            const geometry = new THREE.BoxGeometry(dims.w, dims.h, dims.d);
            const material = new THREE.MeshStandardMaterial({
                color,
                transparent: true,
                opacity: objData.state === 'tentative' ? 0.45 : 0.82,
                emissive: color,
                emissiveIntensity: human ? 0.5 : 0.25
            });
            
            const mesh = new THREE.Mesh(geometry, material);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            
            // Position: BEV coordinates are (x, y) in ground plane
            // Three.js: x=x, y=height/2, z=-y (flip y to z, negate for forward)
            mesh.position.set(objData.world_x, dims.h / 2, -objData.world_y);
            
            // Wireframe outline — thicker + brighter purple for humans
            const edges = new THREE.EdgesGeometry(geometry);
            const lineMaterial = new THREE.LineBasicMaterial({
                color: human ? COL_HUMAN : 0xffffff,
                transparent: true,
                opacity: human ? 0.95 : 0.3
            });
            const wireframe = new THREE.LineSegments(edges, lineMaterial);
            mesh.add(wireframe);

            // Extra scaled outline shell for humans (halo effect)
            if (human) {
                const outlineGeo = new THREE.BoxGeometry(
                    dims.w * 1.18, dims.h * 1.08, dims.d * 1.18
                );
                const outlineMat = new THREE.MeshBasicMaterial({
                    color: COL_HUMAN,
                    side: THREE.BackSide,
                    transparent: true,
                    opacity: 0.35
                });
                const outline = new THREE.Mesh(outlineGeo, outlineMat);
                mesh.add(outline);
            }
            
            return mesh;
        }

        // Create label sprite
        function createLabel(text, color = 0xffffff) {
            const canvas = document.createElement('canvas');
            const context = canvas.getContext('2d');
            canvas.width = 256;
            canvas.height = 64;
            
            context.fillStyle = 'rgba(0, 0, 0, 0.6)';
            context.fillRect(0, 0, canvas.width, canvas.height);
            
            context.font = 'Bold 24px Arial';
            context.fillStyle = `#${color.toString(16).padStart(6, '0')}`;
            context.textAlign = 'center';
            context.textBaseline = 'middle';
            context.fillText(text, canvas.width / 2, canvas.height / 2);
            
            const texture = new THREE.CanvasTexture(canvas);
            const spriteMaterial = new THREE.SpriteMaterial({ map: texture });
            const sprite = new THREE.Sprite(spriteMaterial);
            sprite.scale.set(2, 0.5, 1);
            
            return sprite;
        }
        
        // Create traffic sign mesh (pole + sign board)
        function createSignMesh(signData) {
            const dims = SIGN_DIMENSIONS[signData.name] || SIGN_DIMENSIONS['unknown_sign'];
            
            const group = new THREE.Group();
            
            // Pole (thin cylinder)
            const poleGeometry = new THREE.CylinderGeometry(0.05, 0.05, 1.5, 8);
            const poleMaterial = new THREE.MeshStandardMaterial({
                color: 0x666666,
                metalness: 0.5,
                roughness: 0.5
            });
            const pole = new THREE.Mesh(poleGeometry, poleMaterial);
            pole.position.y = 0.75;
            pole.castShadow = true;
            group.add(pole);
            
            // Sign board (flat rectangle at top)
            const signGeometry = new THREE.BoxGeometry(dims.w, dims.w, dims.d);
            const signMaterial = new THREE.MeshStandardMaterial({
                color: dims.color,
                emissive: dims.color,
                emissiveIntensity: 0.3,
                metalness: 0.1,
                roughness: 0.3
            });
            const signBoard = new THREE.Mesh(signGeometry, signMaterial);
            signBoard.position.y = 1.8;
            signBoard.castShadow = true;
            
            // Border for sign
            const edges = new THREE.EdgesGeometry(signGeometry);
            const lineMaterial = new THREE.LineBasicMaterial({
                color: 0x000000,
                linewidth: 2
            });
            const border = new THREE.LineSegments(edges, lineMaterial);
            signBoard.add(border);
            
            group.add(signBoard);
            
            // Position in world
            group.position.set(signData.world_x, 0, -signData.world_y);
            
            return group;
        }

        // Flashing state for collision objects
        let flashState = false;
        setInterval(() => { flashState = !flashState; }, 400);

        // Update tracked objects
        function updateObjects(data) {
            const currentIds = new Set();
            
            data.forEach(obj => {
                currentIds.add(obj.id);
                const color  = objectColor(obj);
                const dims   = CLASS_DIMENSIONS[obj.name] || CLASS_DIMENSIONS['misc'];
                const isCollision = obj.front_collision || obj.back_collision;
                
                if (trackedObjects.has(obj.id)) {
                    // Update existing object
                    const tracked = trackedObjects.get(obj.id);
                    
                    // Smooth position update
                    tracked.mesh.position.x = obj.world_x;
                    tracked.mesh.position.z = -obj.world_y;
                    
                    // Update colour + flash
                    tracked.mesh.material.color.setHex(color);
                    tracked.mesh.material.emissive.setHex(color);
                    tracked.mesh.material.emissiveIntensity = isCollision && flashState ? 0.9 : 0.25;
                    tracked.mesh.material.opacity = obj.state === 'tentative' ? 0.45 : 0.82;
                    
                    // Update label
                    if (tracked.label) {
                        tracked.label.position.copy(tracked.mesh.position);
                        tracked.label.position.y = dims.h + 0.5;
                    }
                    
                    // Update trail
                    if (showTrails && trails.has(obj.id)) {
                        const trail = trails.get(obj.id);
                        trail.positions.push(new THREE.Vector3(obj.world_x, 0.1, -obj.world_y));
                        if (trail.positions.length > 50) trail.positions.shift();
                        
                        const points = trail.positions;
                        const geometry = new THREE.BufferGeometry().setFromPoints(points);
                        trail.line.geometry.dispose();
                        trail.line.geometry = geometry;
                    }
                } else {
                    // Create new object
                    const mesh = createObjectMesh(obj);
                    scene.add(mesh);
                    
                    const labelText = isCollision ? `⚠ ${obj.name} #${obj.id}` : `${obj.name} #${obj.id}`;
                    const label = createLabel(labelText, color);
                    label.position.set(obj.world_x, dims.h + 0.5, -obj.world_y);
                    if (showLabels) scene.add(label);
                    
                    trackedObjects.set(obj.id, { mesh, label, data: obj });
                    
                    // Create trail
                    if (showTrails) {
                        const positions = [new THREE.Vector3(obj.world_x, 0.1, -obj.world_y)];
                        const geometry = new THREE.BufferGeometry().setFromPoints(positions);
                        const material = new THREE.LineBasicMaterial({
                            color,
                            transparent: true,
                            opacity: 0.5
                        });
                        const line = new THREE.Line(geometry, material);
                        scene.add(line);
                        trails.set(obj.id, { line, positions });
                    }
                }
            });
            
            // Remove objects that are no longer tracked
            trackedObjects.forEach((tracked, id) => {
                if (!currentIds.has(id)) {
                    scene.remove(tracked.mesh);
                    if (tracked.label) scene.remove(tracked.label);
                    tracked.mesh.geometry.dispose();
                    tracked.mesh.material.dispose();
                    trackedObjects.delete(id);
                    
                    if (trails.has(id)) {
                        const trail = trails.get(id);
                        scene.remove(trail.line);
                        trail.line.geometry.dispose();
                        trail.line.material.dispose();
                        trails.delete(id);
                    }
                }
            });
        }

        // Update traffic signs
        function updateSigns(signs) {
            const currentIds = new Set();
            
            signs.forEach(sign => {
                const signKey = `sign_${sign.id}`;
                currentIds.add(signKey);
                
                if (trafficSigns.has(signKey)) {
                    // Update existing sign position
                    const signObj = trafficSigns.get(signKey);
                    signObj.mesh.position.x = sign.world_x;
                    signObj.mesh.position.z = -sign.world_y;
                    
                    if (signObj.label) {
                        signObj.label.position.set(sign.world_x, 2.5, -sign.world_y);
                    }
                } else {
                    // Create new sign
                    const mesh = createSignMesh(sign);
                    scene.add(mesh);
                    
                    const dims = SIGN_DIMENSIONS[sign.name] || SIGN_DIMENSIONS['unknown_sign'];
                    const label = createLabel(sign.name, dims.color);
                    label.position.set(sign.world_x, 2.5, -sign.world_y);
                    if (showLabels) scene.add(label);
                    
                    trafficSigns.set(signKey, { mesh, label, data: sign });
                }
            });
            
            // Remove signs that are no longer detected
            trafficSigns.forEach((signObj, key) => {
                if (!currentIds.has(key)) {
                    scene.remove(signObj.mesh);
                    if (signObj.label) scene.remove(signObj.label);
                    trafficSigns.delete(key);
                }
            });
        }

        // Update info panel
        function updateInfoPanel(data, signs) {
            const confirmed = data.filter(obj => obj.state === 'confirmed');
            const tentative = data.filter(obj => obj.state === 'tentative');
            
            document.getElementById('object-count').textContent = 
                `${confirmed.length} confirmed, ${tentative.length} tentative`;
            
            const objectsList = document.getElementById('objects-list');
            objectsList.innerHTML = '';
            
            [...confirmed, ...tentative].forEach(obj => {
                const isCollision = obj.front_collision || obj.back_collision;
                const isBack      = obj.world_y < 0;
                let cls = `object-item ${obj.state}`;
                if (isCollision) cls += ' collision';
                else if (isBack) cls += ' back-obj';

                const div = document.createElement('div');
                div.className = cls;
                
                const speed = Math.sqrt(obj.vx * obj.vx + obj.vy * obj.vy);
                
                const radarSpeedStr = obj.radar_speed != null
                    ? `${obj.radar_speed.toFixed(1)} km/h ${obj.radar_direction ? '▼ approaching' : '▲ receding'}`
                    : '—';

                const collisionTag = obj.front_collision ? ' 🔴 FRONT COLLISION'
                                   : obj.back_collision  ? ' 🔴 BACK COLLISION'
                                   : '';
                console.log(obj)
                div.innerHTML = `
                    <div class="object-header">
                        <span class="object-name">${obj.name}${collisionTag}</span>
                        <span class="object-id">ID: ${obj.id}</span>
                    </div>
                    <div class="object-details">
                        Side: ${obj.world_y >= 0 ? 'front' : 'back'} &nbsp;
                        Pos: (${obj.world_x.toFixed(2)}, ${obj.world_y.toFixed(2)})m<br>
                        Tracker vel: ${speed.toFixed(2)} m/s<br>
                        Radar speed: ${radarSpeedStr}<br>
                        Confidence: ${obj.confidence.toFixed(2)} &nbsp; Hits: ${obj.hits}
                    </div>
                `;
                
                objectsList.appendChild(div);
            });
            
            // Traffic signs section
            if (signs && signs.length > 0) {
                const signsHeader = document.createElement('div');
                signsHeader.style.cssText = 'margin-top:15px;font-weight:bold;color:#FFD700;';
                signsHeader.textContent = `Traffic Signs (${signs.length})`;
                objectsList.appendChild(signsHeader);
                
                signs.forEach(sign => {
                    const div = document.createElement('div');
                    div.className = 'object-item';
                    div.style.borderLeftColor = '#FFD700';
                    div.style.background = 'rgba(255, 215, 0, 0.1)';
                    
                    div.innerHTML = `
                        <div class="object-header">
                            <span class="object-name" style="color:#FFD700;">${sign.name}</span>
                            <span class="object-id">ID: ${sign.id}</span>
                        </div>
                        <div class="object-details">
                            Pos: (${sign.world_x.toFixed(2)}, ${sign.world_y.toFixed(2)})m<br>
                            Confidence: ${sign.confidence.toFixed(2)}
                        </div>
                    `;
                    
                    objectsList.appendChild(div);
                });
            }
        }
        
        // Update collision warning UI
        function updateCollisionWarning(collision) {
            const warningEl = document.getElementById('collision-warning');
            const infoEl = document.getElementById('collision-info');
            const distanceEl = document.getElementById('collision-distance');
            const confidenceEl = document.getElementById('collision-confidence');
            const leftIndicator = document.getElementById('indicator-left');
            const frontIndicator = document.getElementById('indicator-front');
            const rightIndicator = document.getElementById('indicator-right');
            
            // Update front threat
            if (collision.front_threat) {
                warningEl.style.display = 'block';
                infoEl.classList.add('active');
                frontIndicator.classList.add('active');
                
                if (collision.closest_front_dist !== null) {
                    distanceEl.textContent = `Distance: ${collision.closest_front_dist.toFixed(2)}m`;
                    confidenceEl.textContent = `Confidence: ${collision.front_confidence.toFixed(2)}`;
                }
            } else {
                warningEl.style.display = 'none';
                infoEl.classList.remove('active');
                frontIndicator.classList.remove('active');
            }
            
            // Update side threats
            if (collision.side_threat_left) {
                leftIndicator.classList.add('active');
            } else {
                leftIndicator.classList.remove('active');
            }
            
            if (collision.side_threat_right) {
                rightIndicator.classList.add('active');
            } else {
                rightIndicator.classList.remove('active');
            }
            
            // Update vibrator intensity visualization (optional: could add visual feedback)
            const leftIntensity = collision.vibrator_left;
            const rightIntensity = collision.vibrator_right;
            
            if (leftIntensity > 0) {
                leftIndicator.style.opacity = 0.5 + (leftIntensity * 0.5);
            }
            if (rightIntensity > 0) {
                rightIndicator.style.opacity = 0.5 + (rightIntensity * 0.5);
            }
        }

        // WebSocket connection
        let ws = null;
        let lastUpdateTime = Date.now();
        let updateCount = 0;

        function connectWebSocket() {
            // Use the hostname of the server serving this file, or localhost if opened via file://
            const host = window.location.hostname || 'localhost';
            ws = new WebSocket(`ws://${host}:8765`);
            
            ws.onopen = () => {
                console.log('Connected to tracking system');
                document.getElementById('connection-status').textContent = '● CONNECTED';
                document.getElementById('connection-status').className = 'connection-status connected';
            };
            
            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                
                // Update dimensions if config is present
                if (data.config) {
                    if (data.config.class_dimensions) {
                        CLASS_DIMENSIONS = data.config.class_dimensions;
                    }
                    if (data.config.sign_dimensions) {
                        SIGN_DIMENSIONS = data.config.sign_dimensions;
                    }
                    if (data.config.default_class_dimension) {
                        DEFAULT_CLASS_DIMENSION = data.config.default_class_dimension;
                    }
                    if (data.config.default_sign_dimension) {
                        DEFAULT_SIGN_DIMENSION = data.config.default_sign_dimension;
                    }
                    if (data.config.human_class) {
                        HUMAN_CLASSES = new Set(data.config.human_class);
                    }
                }
                
                updateObjects(data.tracks);
                updateSigns(data.signs || []);
                updateInfoPanel(data.tracks, data.signs || []);
                updateCollisionWarning(data.collision || {});
                
                // Update rate calculation
                updateCount++;
                const now = Date.now();
                if (now - lastUpdateTime > 1000) {
                    const rate = updateCount / ((now - lastUpdateTime) / 1000);
                    document.getElementById('update-rate').textContent = `${rate.toFixed(1)} Hz`;
                    updateCount = 0;
                    lastUpdateTime = now;
                }
            };
            
            ws.onclose = () => {
                console.log('Disconnected from tracking system');
                document.getElementById('connection-status').textContent = '● DISCONNECTED';
                document.getElementById('connection-status').className = 'connection-status disconnected';
                setTimeout(connectWebSocket, 2000);
            };
            
            ws.onerror = (error) => {
                console.error('WebSocket error:', error);
            };
        }

        // Controls
        document.getElementById('reset-camera').addEventListener('click', () => {
            camera.position.set(0, 15, 10);
            camera.lookAt(0, 0, 0);
            controls.target.set(0, 0, 0);
        });

        document.getElementById('toggle-grid').addEventListener('click', () => {
            showGrid = !showGrid;
            gridHelper.visible = showGrid;
        });

        document.getElementById('toggle-labels').addEventListener('click', () => {
            showLabels = !showLabels;
            trackedObjects.forEach(tracked => {
                if (tracked.label) {
                    tracked.label.visible = showLabels;
                }
            });
        });

        document.getElementById('toggle-trails').addEventListener('click', () => {
            showTrails = !showTrails;
            if (!showTrails) {
                trails.forEach(trail => {
                    scene.remove(trail.line);
                    trail.line.geometry.dispose();
                    trail.line.material.dispose();
                });
                trails.clear();
            }
        });

        // Handle window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Animation loop
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        // Start
        connectWebSocket();
        animate();
    </script>
</body>
</html>
